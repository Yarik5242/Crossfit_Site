<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="portfolio.css">
  <title>Document</title>

  <style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:#0b0f14;
color:white;
}

/* контейнер */



.container{
width:90%;
max-width:1200px;
margin:auto;
padding:80px 0;
text-align:center;
}

/* заголовок */

.title{
font-size:42px;
font-weight:700;
margin-bottom:10px;
}

.subtitle{
color:#9ca3af;
margin-bottom:60px;
}

/* grid */

.portfolio-grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
}

/* карточка */

.card{
overflow:hidden;
border-radius:10px;
background:#111827;
}

.modal{
display:none; 
/* при дисплее нан он как бы вообще не видит фотку "ничего нету, а когда мы хотим ее видеть
то дисплей флекс, и она тогда появляется типа " */

/*  при флексе а ну тоесть оно у нас есть,
 мы его добавили но оно не видимо и что оно появлилось надо плащ невидимку снять  */
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
align-items:center;
justify-content:center;
z-index:1000;
}

.modal img{
max-width:90%;
max-height:90%;
border-radius:10px;
}

.card img{
width: 100%;
height: 250px;
object-fit: cover;
display: block;
transition: .3s;
}

.card:hover img{
transform:scale(1.05);
}

.back {
  margin-bottom: 35px;
  border-radius: 10%;
  padding:12px 28px;
background:#2563eb;
color:white;
text-decoration:none;
border-radius:8px;
transition:0.3s;
}

.back:hover{
background:#1d4ed8;
}

/* планшет */

@media (max-width:900px){

.portfolio-grid{
grid-template-columns:repeat(2,1fr);
}

}

/* мобильный */

@media (max-width:500px){

.title{
font-size:32px;
}

.portfolio-grid{
grid-template-columns:1fr;
}

.card img{
height:220px;
}


}

</style>
</head>
<body>
  <section class="container">

  <h1 class="title">Portfolio</h1>
  <p class="subtitle">🚧 Страница находится в разработке.</p>
  <button class="back"><a href="index.html" class="back">Вернуться назад</a></button>

  <div class="portfolio-grid">

    <div class="card">
      <img src="portfolio/benchPress_loga+yarik.jpg" onclick="openImage(this.src)">
    </div>

    <div class="card">
      <img src="portfolio/dayn.jpg" onclick="openImage(this.src)">
    </div>

    <div class="card">
      <img src="portfolio/kot.jpg" onclick="openImage(this.src)">
    </div>

    <div class="card">
      <img src="portfolio/loga_kfc.jpg" onclick="openImage(this.src)">
    </div>

    <div class="card">
      <img src="portfolio/vova_scrimer.jpg" onclick="openImage(this.src)">
    </div>
    
    <div class="card">
      <img src="portfolio/telesh+misha.jpg" onclick="openImage(this.src)">
    </div>

    <div class="card">
      <img src="portfolio/mishaPenis.jpg" onclick="openImage(this.src)">
    </div>

    <div class="card">
      <img src="portfolio/photo_2025-02-22_20-50-46.jpg" onclick="openImage(this.src)">
    </div>

    <div class="card">
      <img src="portfolio/vova_boy.jpg" onclick="openImage(this.src)">
    </div>

    <div class="card">
      <img src="portfolio/semen.jpg" onclick="openImage(this.src)">
    </div>

    <div class="card">
      <img src="portfolio/лога монстр.jpg" onclick="openImage(this.src)">
    </div>

    <div class="card">
      <img src="portfolio/patrioti.jpg" onclick="openImage(this.src)">
    </div>
  </div>
  <div id="imageModal" class="modal" onclick="closeImage()">
    <img id="modalImg">
  </div>
  </section>


<script>

function openImage(src){
const modal = document.getElementById("imageModal")
const modalImg = document.getElementById("modalImg")

modal.style.display = "flex" // типа дисплей в начале нан, щас стал флекс и картинка показывается
// а ну тоесть оно у нас есть, 
// мы его добавили но оно не видимо и что оно появлилось надо плащ невидимку снять 
modalImg.src = src // ну и показывается картинк с тем адрессом, на который как бы нажали
}

function closeImage(){
document.getElementById("imageModal").style.display = "none" // тут при нане закрывается 
}

</script>
</body>
</html>
